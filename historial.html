<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial NOSO - Nube</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .container { max-width: 1000px; margin: auto; padding: 20px; font-family: sans-serif; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #1a365d; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>Historial de Servicios</h1>
    <table>
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Cliente</th>
                <th>Categoría</th>
                <th>Presupuesto</th>
            </tr>
        </thead>
        <tbody id="lista-historial">
            <tr><td colspan="4">Cargando datos desde la nube...</td></tr>
        </tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDGgl81VNAPQjn7VY5nM5jCVjM3jYuPJcE",
        projectId: "noso-database",
        storageBucket: "noso-database.firebasestorage.app",
        appId: "1:12584345878:web:e16f2d118621ef3caf7037"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function cargarHistorial() {
        const lista = document.getElementById('lista-historial');
        try {
            const querySnapshot = await getDocs(collection(db, "servicios"));
            lista.innerHTML = ""; 

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const fila = `<tr>
                    <td>${data.fecha || '-'}</td>
                    <td>${data.cliente || '-'}</td>
                    <td>${data.categoria || '-'}</td>
                    <td>$${data.presupuesto || '0'}</td>
                </tr>`;
                lista.innerHTML += fila;
            });
        } catch (error) {
            lista.innerHTML = `<tr><td colspan="4">Error al cargar: ${error.message}</td></tr>`;
        }
    }

    cargarHistorial();
</script>

<script type="module"></script>

</body>
</html>
